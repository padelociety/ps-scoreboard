<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS Scoreboard – TV</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --green:   #104734;
    --green2:  #1a5c44;
    --cream:   #f0ead2;
    --gold:    #f5c518;
    --silver:  #d0d8e0;
    --dark:    #0a0a0a;
  }

  html, body {
    width:100%; height:100%;
    background: var(--green);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* ── 배경 패턴 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(255,255,255,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── 메인 컨테이너 ── */
  .sb-wrap {
    position: relative;
    width: min(96vw, 1400px);
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── 배너: 카드 아래에 absolute 고정 (카드 안 밀림) ── */
  .star-banner,
  .gold-banner {
    position: absolute;
    left: 0; right: 0;
    top: calc(100% + 12px);
  }

  /* ── 타이틀 바 ── */
  .sb-title {
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(245,197,24,0.3);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 24px;
  }
  .sb-title-text {
    font-size: clamp(28px, 4vw, 52px);
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--cream);
    text-transform: uppercase;
  }

  /* ── 팀 행 ── */
  .sb-teams {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.08);
    border-top: none;
  }

  .sb-row {
    display: grid;
    grid-template-columns: 1fr 120px 120px 120px 160px;
    align-items: center;
    padding: 0 40px;
    min-height: 130px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: background 0.3s;
  }
  .sb-row:last-child { border-bottom: none; }
  .sb-row.serving {
  }

  /* 이름 */
  .sb-name {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .sb-name span {
    font-size: clamp(36px, 5vw, 72px);
    font-weight: 800;
    color: var(--cream);
    letter-spacing: 1px;
    line-height: 1;
  }

  /* 셀 헤더 */
  .sb-header {
    display: grid;
    grid-template-columns: 1fr 120px 120px 120px 160px;
    padding: 12px 40px 8px;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.08);
    border-top: none;
    border-bottom: none;
  }
  .sb-header-cell {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 3px;
    color: rgba(240,234,210,0.4);
    text-align: center;
    text-transform: uppercase;
  }
  .sb-header-cell:first-child { text-align: left; }

  /* 셀 */
  .sb-cell {
    text-align: center;
    font-size: clamp(40px, 5.5vw, 80px);
    font-weight: 900;
    color: var(--cream);
    line-height: 1;
  }
  .sb-cell.set {
    font-size: clamp(32px, 4vw, 60px);
    color: rgba(240,234,210,0.5);
  }
  .sb-cell.set.has-score {
    color: rgba(240,234,210,0.85);
  }
  .sb-cell.set.current {
    color: var(--cream);
    font-size: clamp(36px, 4.5vw, 68px);
  }
  .sb-cell.point {
    color: var(--gold);
    font-size: clamp(44px, 6vw, 88px);
  }

  /* 구분선 */
  .sb-divider {
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(245,197,24,0.4), transparent);
    border: none;
  }

  /* ── STAR POINT 배너 ── */
  .star-banner {
    display: none;
    background: linear-gradient(90deg, #0a0a0a 0%, #1e1e1e 40%, #1e1e1e 60%, #0a0a0a 100%);
    border: 1px solid rgba(208,216,224,0.3);
    border-radius: 0 0 12px 12px;
    padding: 14px 40px;
    text-align: center;
    overflow: hidden;
  }
  .star-banner.visible { display: block; }
  .star-banner-text {
    font-size: clamp(24px, 3vw, 44px);
    font-weight: 900;
    letter-spacing: 10px;
    color: var(--silver);
    animation: starGlow 1.2s ease-in-out infinite alternate;
  }
  @keyframes starGlow {
    0%   { text-shadow: 0 0 8px rgba(180,200,220,0.4); opacity:0.8; color: #b0b8c8; }
    100% { text-shadow: 0 0 20px rgba(220,235,255,1), 0 0 50px rgba(200,220,255,0.6); opacity:1; color: #e8f0ff; }
  }
  .star-banner::after {
    content:'';
    position:absolute;
    top:0; left:-100%;
    width:60%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(200,220,255,0.12), transparent);
    animation: shimmer 2.5s linear infinite;
  }

  /* ── GOLDEN POINT 배너 ── */
  .gold-banner {
    display: none;
    background: linear-gradient(90deg, #0a0800 0%, #2a1f00 40%, #2a1f00 60%, #0a0800 100%);
    border: 1px solid rgba(245,197,24,0.35);
    border-radius: 0 0 12px 12px;
    padding: 14px 40px;
    text-align: center;
    overflow: hidden;
  }
  .gold-banner.visible { display: block; }
  .gold-banner-text {
    font-size: clamp(24px, 3vw, 44px);
    font-weight: 900;
    letter-spacing: 10px;
    color: var(--gold);
    animation: goldGlow 1.2s ease-in-out infinite alternate;
  }
  @keyframes goldGlow {
    0%   { text-shadow: 0 0 8px rgba(245,197,24,0.4); opacity:0.85; }
    100% { text-shadow: 0 0 24px rgba(245,197,24,1), 0 0 60px rgba(245,150,0,0.5); opacity:1; }
  }
  .gold-banner::after {
    content:'';
    position:absolute;
    top:0; left:-100%;
    width:60%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(245,197,24,0.18), transparent);
    animation: shimmer 1.8s linear infinite;
  }

  @keyframes shimmer {
    0%   { left:-100%; }
    100% { left:200%; }
  }

  /* ── 점수 팝 애니메이션 ── */
  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop .3s ease-out; }

  /* ── 연결 상태 ── */
  .conn-dot {
    position: fixed;
    bottom: 20px;
    right: 24px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #555;
    transition: background 0.4s;
  }
  .conn-dot.on { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
</style>
</head>
<body>

<div class="sb-wrap">

  <!-- 타이틀 -->
  <div class="sb-title">
    <div class="sb-title-text" id="tvTitle">PS i-League</div>
  </div>

  <!-- 헤더 -->
  <div class="sb-header">
    <div class="sb-header-cell">선수</div>
    <div class="sb-header-cell">SET 1</div>
    <div class="sb-header-cell">SET 2</div>
    <div class="sb-header-cell">SET 3</div>
    <div class="sb-header-cell">POINT</div>
  </div>

  <!-- 팀 행 -->
  <div class="sb-teams">
    <div class="sb-row" id="tvRowA">
      <div class="sb-name">
        <span id="tvNameA">Team A</span>
        <div class="serve-icon"></div>
      </div>
      <div class="sb-cell set current" id="tvSetA1"></div>
      <div class="sb-cell set"         id="tvSetA2"></div>
      <div class="sb-cell set"         id="tvSetA3"></div>
      <div class="sb-cell point"       id="tvPointA">0</div>
    </div>

    <hr class="sb-divider">

    <div class="sb-row" id="tvRowB">
      <div class="sb-name">
        <span id="tvNameB">Team B</span>
        <div class="serve-icon"></div>
      </div>
      <div class="sb-cell set current" id="tvSetB1"></div>
      <div class="sb-cell set"         id="tvSetB2"></div>
      <div class="sb-cell set"         id="tvSetB3"></div>
      <div class="sb-cell point"       id="tvPointB">0</div>
    </div>
  </div>

  <!-- 배너 -->
  <div class="star-banner" id="tvStarBanner">
    <div class="star-banner-text">✦&nbsp;&nbsp;STAR POINT&nbsp;&nbsp;✦</div>
  </div>
  <div class="gold-banner" id="tvGoldBanner">
    <div class="gold-banner-text">👑&nbsp;&nbsp;GOLDEN POINT&nbsp;&nbsp;👑</div>
  </div>

</div>

<div class="conn-dot" id="connDot"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyBkrib1qzN8IE9NcW8tXTfKb4Z6JsOjcvE",
    authDomain:        "ps-score-868bb.firebaseapp.com",
    databaseURL:       "https://ps-score-868bb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "ps-score-868bb",
    storageBucket:     "ps-score-868bb.firebasestorage.app",
    messagingSenderId: "48470302084",
    appId:             "1:48470302084:web:b037acc0b58f7e85d191d1"
  };

  firebase.initializeApp(firebaseConfig);
  const db  = firebase.database();
  const ref = db.ref('scoreboard');
  const dot = document.getElementById('connDot');

  const POINTS = ['0','15','30','40','AD'];

  let prevPA = 0, prevPB = 0;

  function pop(el) {
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }

  function setCell(elId, val, classes) {
    const el = document.getElementById(elId);
    el.textContent = val;
    el.className = 'sb-cell ' + classes;
  }

  ref.on('value', snap => {
    dot.classList.add('on');
    const S = snap.val();
    if (!S) return;

    document.getElementById('tvTitle').textContent = S.title || '';
    document.getElementById('tvNameA').textContent = S.a?.name || '';
    document.getElementById('tvNameB').textContent = S.b?.name || '';

    // 서브권
    document.getElementById('tvRowA').classList.toggle('serving', !!S.a?.serving);
    document.getElementById('tvRowB').classList.toggle('serving', !!S.b?.serving);

    // 포인트
    const starMode = !!S.starPoint;
    const sets = (S.a?.sets||[]).length;
    const isTB = S.a?.game === 6 && S.b?.game === 6;
    const isSuperTB = !!S.superTB && sets === 2;
    const useRaw = isTB || isSuperTB;
    const DISP = useRaw ? null : (starMode ? ['0','15','30','40','⭐'] : POINTS);
    const ptA = useRaw ? (S.a?.point ?? 0) : (DISP[S.a?.point] ?? S.a?.point ?? '0');
    const ptB = useRaw ? (S.b?.point ?? 0) : (DISP[S.b?.point] ?? S.b?.point ?? '0');
    const elPA = document.getElementById('tvPointA');
    const elPB = document.getElementById('tvPointB');
    if ((S.a?.point ?? 0) !== prevPA) { pop(elPA); prevPA = S.a?.point ?? 0; }
    if ((S.b?.point ?? 0) !== prevPB) { pop(elPB); prevPB = S.b?.point ?? 0; }
    elPA.textContent = ptA;
    elPB.textContent = ptB;

    // 세트
    const curSet = (S.a?.sets || []).length;
    for (let i = 0; i < 3; i++) {
      const aEl = document.getElementById(`tvSetA${i+1}`);
      const bEl = document.getElementById(`tvSetB${i+1}`);
      if (i < curSet) {
        aEl.textContent = S.a.sets[i];
        bEl.textContent = S.b.sets[i];
        aEl.className = 'sb-cell set has-score';
        bEl.className = 'sb-cell set has-score';
      } else if (i === curSet) {
        aEl.textContent = S.a?.game ?? 0;
        bEl.textContent = S.b?.game ?? 0;
        aEl.className = 'sb-cell set current';
        bEl.className = 'sb-cell set current';
      } else {
        aEl.textContent = '';
        bEl.textContent = '';
        aEl.className = 'sb-cell set';
        bEl.className = 'sb-cell set';
      }
    }

    // 배너
    document.getElementById('tvStarBanner').classList.toggle('visible', starMode);
    document.getElementById('tvGoldBanner').classList.toggle('visible', !!S.goldenPoint);
  });

  ref.on('disconnect', () => dot.classList.remove('on'));
</script>
</body>
</html>
