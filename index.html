<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PS Scoreboard – Control Panel</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PS Control">
<meta name="theme-color" content="#104734">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a472a;
    --green-mid:  #2d6a44;
    --green-light:#3a8a58;
    --gold:       #f5c518;
    --red:        #c0392b;
    --bg:         #111;
    --card:       #1c1c1c;
    --border:     #2a2a2a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); font-family:'Barlow Condensed','Noto Sans KR',sans-serif; color:#eee; min-height:100vh; }

  /* ── HEADER ── */
  .header {
    background:#0d0d0d; border-bottom:1px solid #222;
    padding:10px 16px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .header-title { font-size:16px; font-weight:800; letter-spacing:1px; color:var(--gold); }
  .conn-badge {
    display:flex; align-items:center; gap:6px;
    font-size:11px; font-weight:700; letter-spacing:1px;
    color:#555; text-transform:uppercase;
  }
  .conn-dot { width:7px; height:7px; border-radius:50%; background:#333; transition:background .3s; }
  .conn-dot.live { background:var(--red); animation:pulse 1s infinite; }
  .conn-dot.ok   { background:#2ecc71; animation:none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── MAIN ── */
  .cp { padding:12px 14px; max-width:560px; margin:0 auto; }

  /* mini scoreboard preview */
  .preview {
    background:var(--green-dark); border-radius:6px; overflow:hidden;
    margin-bottom:14px; box-shadow:0 3px 16px rgba(0,0,0,.5);
  }
  .preview-title {
    padding:7px 12px; font-size:14px; font-weight:700;
    border-bottom:1px solid var(--green-mid); color:#fff;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .preview-rows { background:#f0ead2; }
  .preview-row {
    display:grid; grid-template-columns:1fr 42px 42px 42px 52px;
    height:38px; border-bottom:1px solid #ddd5b5; align-items:stretch;
  }
  .preview-row:last-child { border-bottom:none; }
  .preview-name {
    padding:0 10px; display:flex; align-items:center; gap:6px;
    font-size:15px; font-weight:700; color:#1a1a1a; overflow:hidden;
  }

  .serving .pserve { opacity:1; }
  .preview-cell {
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:15px; color:#fff;
    border-left:1px solid rgba(255,255,255,.12);
  }
  .p-game  { background:var(--green-dark); }
  .p-point { background:var(--green-dark); font-size:13px; }
  .p-set   { background:var(--green-mid); color:rgba(255,255,255,.3); font-size:13px; }
  .p-set.has-score  { color:#fff; background:#235438; }
  .p-set.p-set-cur  { background:var(--green-dark); color:#fff; }

  /* sections */
  .section { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px; }
  .sec-label { font-size:10px; font-weight:700; letter-spacing:2px; color:#555; text-transform:uppercase; margin-bottom:10px; }

  input[type=text] {
    background:#252525; border:1px solid #333; border-radius:6px;
    color:#eee; font-family:inherit; font-size:15px;
    padding:8px 12px; width:100%;
  }
  input[type=text]:focus { outline:none; border-color:var(--green-light); }

  /* team cards */
  .teams-grid { display:grid; grid-template-columns:1fr; gap:10px; }
  .team-card { background:#222; border:1px solid #2e2e2e; border-radius:8px; padding:10px; }
  .team-label { font-size:11px; font-weight:700; letter-spacing:1px; color:var(--green-light); text-transform:uppercase; margin-bottom:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .score-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .score-lbl { font-size:11px; color:#666; min-width:40px; }
  .score-val { font-size:24px; font-weight:800; color:#fff; background:var(--green-dark); border-radius:5px; padding:1px 9px; min-width:52px; text-align:center; }

  .btn-grp { display:flex; gap:4px; }
  button { font-family:inherit; font-weight:700; border:none; border-radius:5px; cursor:pointer; transition:all .15s; }
  button:active { transform:scale(.92); }
  .btn-p { background:var(--green-mid); color:#fff; font-size:19px; padding:4px 10px; }
  .btn-p:hover { background:var(--green-light); }
  .btn-m { background:#2e2e2e; color:#888; font-size:17px; padding:4px 8px; }
  .btn-m:hover { background:#3a3a3a; color:#fff; }

  .btn-serve {
    width:100%; margin-top:8px; padding:7px; font-size:11px; letter-spacing:1px;
    background:#252525; color:#666; border:1px solid #333; border-radius:5px;
  }
  .btn-serve.active { background:#3a2800; color:var(--gold); border-color:var(--gold); }

  .sets-display { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .set-chip {
    background:#2a2a2a; border:1px solid #3a3a3a; border-radius:4px;
    padding:2px 7px; font-size:11px; color:#aaa;
    display:flex; align-items:center; gap:4px;
  }
  .set-chip strong { color:#fff; }
  .set-chip button { background:none; border:none; color:#444; font-size:10px; padding:0; }
  .set-chip button:hover { color:var(--red); }

  hr { border:none; border-top:1px solid var(--border); margin:10px 0; }

  .actions { display:flex; gap:8px; flex-wrap:wrap; }
  .btn-action { padding:10px 16px; font-size:13px; letter-spacing:.5px; }
  .btn-save { background:var(--green-dark); color:#fff; }
  .btn-save:hover { background:var(--green-mid); }
  .btn-rp { background:#252525; color:#aaa; border:1px solid #333; }
  .btn-rp:hover { background:#333; color:#fff; }
  .btn-rp.active { background:var(--green-dark); color:#fff; border-color:var(--green-mid); }
  .btn-star { background:#252525; color:#aaa; border:1px solid #333; }
  .btn-star:hover { background:#333; color:#fff; }
  .btn-star.active { background:#3a2800; color:var(--gold); border-color:var(--gold); }
  .btn-gold { background:#252525; color:#aaa; border:1px solid #333; }
  .btn-gold:hover { background:#333; color:#fff; }
  .btn-gold.active { background:#3a1f00; color:#ffb700; border-color:#ffb700; }
  .btn-rs { background:#1a1a00; color:#ccaa00; border:1px solid #444400; }
  .btn-rs:hover { background:#2a2a00; }
  .btn-ra { background:#1a0000; color:var(--red); border:1px solid #400; }
  .btn-ra:hover { background:#2a0000; }

  /* hint box */
  .hint-box {
    background:#0d1a12; border:1px solid #1e3a26; border-radius:8px;
    padding:12px 14px; font-size:12px; color:#4a7a5a; line-height:1.8;
  }
  .hint-box strong { color:#6aaa8a; }
  .hint-box code { background:#1a2a20; padding:1px 5px; border-radius:3px; color:#8aca9a; font-size:11px; }

  /* name input row */
  .name-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .name-row label { font-size:12px; color:#777; min-width:44px; flex-shrink:0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🎾 PS SCOREBOARD</div>
  <div class="conn-badge">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">연결 중...</span>
  </div>
</div>

<div class="cp">

  <!-- Preview -->
  <div class="preview">
    <div class="preview-title" id="pvTitle">PS i-League</div>
    <div class="preview-rows">
      <div class="preview-row" id="pvRowA">
        <div class="preview-name"><span id="pvNameA">Team A</span><div class="pserve"></div></div>
        <div class="preview-cell p-set p-set-cur" id="pvSetA1"></div>
        <div class="preview-cell p-set"            id="pvSetA2"></div>
        <div class="preview-cell p-set"            id="pvSetA3"></div>
        <div class="preview-cell p-point"          id="pvPointA">0</div>
      </div>
      <div class="preview-row" id="pvRowB">
        <div class="preview-name"><span id="pvNameB">Team B</span><div class="pserve"></div></div>
        <div class="preview-cell p-set p-set-cur" id="pvSetB1"></div>
        <div class="preview-cell p-set"            id="pvSetB2"></div>
        <div class="preview-cell p-set"            id="pvSetB3"></div>
        <div class="preview-cell p-point"          id="pvPointB">0</div>
      </div>
    </div>
  </div>

  <!-- Title -->
  <div class="section">
    <div class="sec-label">대회명 / 매치</div>
    <input type="text" id="inTitle" value="PS i-League 26S1" oninput="onTitleChange()">
  </div>

  <!-- Names -->
  <div class="section">
    <div class="sec-label">선수 이름</div>
    <div class="name-row"><label>팀 A</label><input type="text" id="inNameA" value="Team A" oninput="onNameChange()"></div>
    <div class="name-row"><label>팀 B</label><input type="text" id="inNameB" value="Team B" oninput="onNameChange()"></div>
  </div>

  <!-- Score -->
  <div class="section">
    <div class="sec-label">스코어</div>
    <div class="teams-grid">
      <div class="team-card">
        <div class="team-label" id="cardLabelA">Team A</div>
        <div class="score-row">
          <div class="score-lbl">게임</div>
          <div class="score-val" id="cpGameA">0</div>
          <div class="btn-grp">
            <button class="btn-p" onclick="chGame('A',1)">＋</button>
            <button class="btn-m" onclick="chGame('A',-1)">－</button>
          </div>
        </div>
        <div class="score-row">
          <div class="score-lbl">포인트</div>
          <div class="score-val" id="cpPointA">0</div>
          <div class="btn-grp">
            <button class="btn-p" onclick="chPoint('A',1)">＋</button>
            <button class="btn-m" onclick="chPoint('A',-1)">－</button>
          </div>
        </div>
        <button class="btn-serve" id="bServeA" onclick="setServe('A')">🎾 서브권</button>
        <div class="sets-display" id="cpSetsA"></div>
      </div>
      <div class="team-card">
        <div class="team-label" id="cardLabelB">Team B</div>
        <div class="score-row">
          <div class="score-lbl">게임</div>
          <div class="score-val" id="cpGameB">0</div>
          <div class="btn-grp">
            <button class="btn-p" onclick="chGame('B',1)">＋</button>
            <button class="btn-m" onclick="chGame('B',-1)">－</button>
          </div>
        </div>
        <div class="score-row">
          <div class="score-lbl">포인트</div>
          <div class="score-val" id="cpPointB">0</div>
          <div class="btn-grp">
            <button class="btn-p" onclick="chPoint('B',1)">＋</button>
            <button class="btn-m" onclick="chPoint('B',-1)">－</button>
          </div>
        </div>
        <button class="btn-serve" id="bServeB" onclick="setServe('B')">🎾 서브권</button>
        <div class="sets-display" id="cpSetsB"></div>
      </div>
    </div>
    <hr>
    <div class="actions">
      <button class="btn-action btn-save" onclick="saveSet()">✅ 세트 저장</button>
      <button class="btn-action btn-rp" id="btnAutoReset" onclick="toggleAutoReset()">🔄 포인트 자동초기화: OFF</button>
      <button class="btn-action btn-rp" id="btnAutoServe" onclick="toggleAutoServe()">🔄 서브권 자동교체: OFF</button>
      <button class="btn-action btn-rp" id="btnSuperTB" onclick="toggleSuperTB()">🏆 슈퍼타이브레이크: OFF</button>
      <button class="btn-action btn-star" id="btnStar" onclick="toggleStar()">⭐ STAR POINT: OFF</button>
      <button class="btn-action btn-gold" id="btnGold" onclick="toggleGold()">👑 GOLDEN POINT: OFF</button>
      <button class="btn-action btn-rs" onclick="resetScore()">🔁 초기화</button>
      <button class="btn-action btn-ra" onclick="resetAll()">⚠️ 전체 초기화</button>
    </div>
  </div>



</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }         from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBkrib1qzN8IE9NcW8tXTfKb4Z6JsOjcvE",
    authDomain:        "ps-score-868bb.firebaseapp.com",
    databaseURL:       "https://ps-score-868bb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "ps-score-868bb",
    storageBucket:     "ps-score-868bb.firebasestorage.app",
    messagingSenderId: "48470302084",
    appId:             "1:48470302084:web:b037acc0b58f7e85d191d1"
  };

  const POINTS = ['0','15','30','40','AD'];
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const sbRef = ref(db, 'scoreboard');

  // 연결 상태 표시
  import { ref as dbRef, onValue as onVal } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  const connRef = dbRef(db, '.info/connected');
  onVal(connRef, snap => {
    const ok = snap.val() === true;
    document.getElementById('connDot').className  = 'conn-dot ' + (ok ? 'ok' : 'live');
    document.getElementById('connText').textContent = ok ? '연결됨' : '연결 중...';
  });

  let S = {
    title: 'PS i-League 26S1',
    a: { name:'Team A', game:0, point:0, sets:[], serving:false },
    b: { name:'Team B', game:0, point:0, sets:[], serving:false },
  };

  // Firebase 실시간 동기화 (다른 기기에서 열어도 현재 데이터 표시)
  let _firstLoad = true;
  onValue(sbRef, snap => {
    if (snap.val()) {
      S = snap.val();
      // superTB 상태 복원
      if (typeof S.superTB === 'boolean') {
        superTB = S.superTB;
        const btnTB = document.getElementById('btnSuperTB');
        if (btnTB) {
          btnTB.textContent = `🏆 슈퍼타이브레이크: ${superTB ? 'ON' : 'OFF'}`;
          btnTB.classList.toggle('active', superTB);
        }
      }
      if (_firstLoad) {
        syncInputs();   // 첫 로드 때만 입력칸 값 동기화 (타이핑 방해 방지)
        _firstLoad = false;
      }
      renderPreview();
      renderCP();
    }
  });

  function push() {
    set(sbRef, { ...S, superTB });
    renderPreview();
    renderCP();
  }

  function syncInputs() {
    document.getElementById('inTitle').value = S.title;
    document.getElementById('inNameA').value = S.a.name;
    document.getElementById('inNameB').value = S.b.name;
    const btn = document.getElementById('btnStar');
    btn.textContent = `⭐ STAR POINT: ${S.starPoint ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', !!S.starPoint);
    const btnG = document.getElementById('btnGold');
    btnG.textContent = `👑 GOLDEN POINT: ${S.goldenPoint ? 'ON' : 'OFF'}`;
    btnG.classList.toggle('active', !!S.goldenPoint);
  }

  // ── Handlers (global) ──
  let autoResetPoint = false;
  let autoServe = false;
  let superTB = false;

  window.toggleAutoReset = () => {
    autoResetPoint = !autoResetPoint;
    const btn = document.getElementById('btnAutoReset');
    btn.textContent = `🔄 포인트 자동초기화: ${autoResetPoint ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', autoResetPoint);
  };

  window.toggleAutoServe = () => {
    autoServe = !autoServe;
    const btn = document.getElementById('btnAutoServe');
    btn.textContent = `🔄 서브권 자동교체: ${autoServe ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', autoServe);
  };

  window.toggleSuperTB = () => {
    superTB = !superTB;
    const btn = document.getElementById('btnSuperTB');
    btn.textContent = `🏆 슈퍼타이브레이크: ${superTB ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', superTB);
  };

  window.toggleStar = () => {
    S.starPoint = !S.starPoint;
    const btn = document.getElementById('btnStar');
    btn.textContent = `⭐ STAR POINT: ${S.starPoint ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', !!S.starPoint);
    push();
  };

  window.toggleGold = () => {
    S.goldenPoint = !S.goldenPoint;
    const btn = document.getElementById('btnGold');
    btn.textContent = `👑 GOLDEN POINT: ${S.goldenPoint ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', !!S.goldenPoint);
    push();
  };

  window.onTitleChange = () => { S.title = document.getElementById('inTitle').value; push(); };
  window.onNameChange  = () => {
    S.a.name = document.getElementById('inNameA').value;
    S.b.name = document.getElementById('inNameB').value;
    push();
  };
  window.chGame  = (t,d) => {
    const s=t==='A'?S.a:S.b;
    const o=t==='A'?S.b:S.a;
    s.game = Math.max(0, s.game+d);
    if (autoResetPoint) { S.a.point=0; S.b.point=0; }
    // 서브권 자동교체
    if (autoServe && d > 0) {
      const wasA = S.a.serving;
      const wasB = S.b.serving;
      if (wasA) { S.a.serving=false; S.b.serving=true; }
      else if (wasB) { S.b.serving=false; S.a.serving=true; }
    }
    // 스타포인트/골든포인트 자동 비활성화
    if (S.starPoint || S.goldenPoint) {
      S.starPoint = false;
      S.goldenPoint = false;
      const btnS = document.getElementById('btnStar');
      btnS.textContent = '⭐ STAR POINT: OFF';
      btnS.classList.remove('active');
      const btnG = document.getElementById('btnGold');
      btnG.textContent = '👑 GOLDEN POINT: OFF';
      btnG.classList.remove('active');
    }
    push();
  };

  // 타이브레이크 여부 판단
  function isTiebreak() {
    const sets = (S.a.sets||[]).length;
    const isThirdSet = sets === 2;
    if (isThirdSet && superTB) return false; // 슈퍼타이브레이크는 별도 처리
    return S.a.game === 6 && S.b.game === 6;
  }
  function isSuperTiebreak() {
    return superTB && (S.a.sets||[]).length === 2;
  }

  window.chPoint = (t,d) => {
    const s=t==='A'?S.a:S.b;
    const o=t==='A'?S.b:S.a;
    // 슈퍼타이브레이크: 1점씩 무제한
    if (isSuperTiebreak()) {
      s.point = Math.max(0, s.point + d);
      push(); return;
    }
    // 타이브레이크(6-6): 1점씩 무제한
    if (isTiebreak()) {
      s.point = Math.max(0, s.point + d);
      push(); return;
    }
    // 일반 포인트
    s.point = Math.max(0, Math.min(POINTS.length-1, s.point+d));
    push();
  };
  window.setServe = t => {
    if (t === 'A') {
      S.a.serving = !S.a.serving;
      if (S.a.serving) S.b.serving = false;
    } else {
      S.b.serving = !S.b.serving;
      if (S.b.serving) S.a.serving = false;
    }
    push();
  };
  window.saveSet = () => {
    if ((S.a.sets||[]).length >= 3) { alert('최대 3세트입니다.'); return; }
    if (!S.a.sets) S.a.sets = []; if (!S.b.sets) S.b.sets = [];
    S.a.sets.push(S.a.game); S.b.sets.push(S.b.game);
    S.a.game=0; S.b.game=0; S.a.point=0; S.b.point=0;
    push();
  };
  window.delSet = i => { S.a.sets.splice(i,1); S.b.sets.splice(i,1); push(); };
  window.resetPoints = () => { S.a.point=0; S.b.point=0; push(); };
  window.resetScore = () => {
    if (!confirm('선수 이름과 스코어를 초기화 하시겠습니까?')) return;
    S = { title:S.title, a:{name:'',game:0,point:0,sets:[],serving:false}, b:{name:'',game:0,point:0,sets:[],serving:false} };
    push();
    syncInputs();
  };

  window.resetAll = () => {
    if (!confirm('대회명, 선수 이름, 스코어 전체 초기화 하시겠습니까?')) return;
    S = { title:'', a:{name:'',game:0,point:0,sets:[],serving:false}, b:{name:'',game:0,point:0,sets:[],serving:false} };
    push();
    syncInputs();
  };

  // ── Render ──
  function renderCP() {
    const pt = t => (isTiebreak() || isSuperTiebreak()) ? t.point : (POINTS[t.point] ?? t.point);
    document.getElementById('cardLabelA').textContent = S.a.name;
    document.getElementById('cardLabelB').textContent = S.b.name;
    document.getElementById('cpGameA').textContent  = S.a.game;
    document.getElementById('cpGameB').textContent  = S.b.game;
    document.getElementById('cpPointA').textContent = pt(S.a);
    document.getElementById('cpPointB').textContent = pt(S.b);
    document.getElementById('bServeA').classList.toggle('active', !!S.a.serving);
    document.getElementById('bServeB').classList.toggle('active', !!S.b.serving);
    renderChips('A', S.a.sets||[]);
    renderChips('B', S.b.sets||[]);
  }

  function renderChips(t, sets) {
    const c = document.getElementById('cpSets'+t);
    c.innerHTML = '';
    sets.forEach((v,i) => {
      const d = document.createElement('div');
      d.className = 'set-chip';
      d.innerHTML = `S${i+1}:<strong>${v}</strong><button onclick="delSet(${i})">✕</button>`;
      c.appendChild(d);
    });
  }

  function renderPreview() {
    const POINTS = ['0','15','30','40','AD'];
    const pt = t => POINTS[t.point] ?? t.point;
    document.getElementById('pvTitle').textContent  = S.title;
    document.getElementById('pvNameA').textContent  = S.a.name;
    document.getElementById('pvNameB').textContent  = S.b.name;
    document.getElementById('pvPointA').textContent = pt(S.a);
    document.getElementById('pvPointB').textContent = pt(S.b);
    document.getElementById('pvRowA').classList.toggle('serving', !!S.a.serving);
    document.getElementById('pvRowB').classList.toggle('serving', !!S.b.serving);

    const curSet = (S.a.sets||[]).length;
    for (let i=0; i<3; i++) {
      const ca = document.getElementById(`pvSetA${i+1}`);
      const cb = document.getElementById(`pvSetB${i+1}`);
      if (i < curSet) {
        ca.textContent = S.a.sets[i]; cb.textContent = S.b.sets[i];
        ca.className = 'preview-cell p-set has-score';
        cb.className = 'preview-cell p-set has-score';
      } else if (i === curSet) {
        ca.textContent = S.a.game ?? 0;
        cb.textContent = S.b.game ?? 0;
        ca.className = 'preview-cell p-set has-score p-set-cur';
        cb.className = 'preview-cell p-set has-score p-set-cur';
      } else {
        ca.textContent = ''; cb.textContent = '';
        ca.className = 'preview-cell p-set';
        cb.className = 'preview-cell p-set';
      }
    }
  }

  push(); // 초기 렌더

  // PWA 서비스워커 등록
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
